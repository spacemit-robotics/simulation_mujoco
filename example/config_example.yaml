# ============================================================
# simulation/mujoco 配置示例
# ============================================================
# 本配置演示 MuJoCo 仿真模块自身命名空间下的 YAML 字段。
# 机器人固有属性（default_joint_pos / kp / kd）由调用方在外部 yaml 中
# 自行组织，并通过 Simulator 构造函数传入，不属于本模块的命名空间。

simulation:
  type: "mujoco"

  mujoco:
    # 初始化参数
    init_height: 0.85     # 机器人初始释放高度（m）
    assist_height: 0.75   # 悬挂保护目标高度（m）

    # 仿真时间步长（秒）
    sim_dt: 0.002

    # 悬挂力参数（可选，不配置时使用默认值）
    # assist_kp: 500.0                  # 悬挂 PD 刚度
    # assist_kd: 100.0                  # 悬挂 PD 阻尼
    # assist_gravity_compensation: 0.0  # 额外恒定向上力（N），重型机器人可酌情配置
