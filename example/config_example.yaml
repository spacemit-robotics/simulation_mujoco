# ============================================================
# simulation/mujoco 配置示例
# ============================================================
# 本配置演示 MuJoCo 仿真模块的 YAML 配置格式（基于 G1 29-DOF 机器人）

# ============================================================
# Simulation — MuJoCo 仿真配置
# ============================================================
simulation:
  type: "mujoco"

  mujoco:
    # 初始化参数
    init_height: 0.85     # 机器人初始释放高度（m）
    assist_height: 0.75   # 悬挂保护目标高度（m）

    # 仿真时间步长（秒）
    sim_dt: 0.002

    # 悬挂力参数（可选，不配置时使用默认值）
    # assist_kp: 500.0                  # 悬挂 PD 刚度
    # assist_kd: 100.0                  # 悬挂 PD 阻尼
    # assist_gravity_compensation: 0.0  # 额外恒定向上力（N），重型机器人可酌情配置

    # 控制器参数（29 个关节）
    # 顺序：左腿6 + 右腿6 + 腰3 + 左臂7 + 右臂7
    controller:
      kp: [100, 100, 100, 150, 40, 40,    # 左腿
           100, 100, 100, 150, 40, 40,    # 右腿
           600, 500, 500,                 # 腰（加大刚度，近似锁腰）
           40, 40, 40, 40, 20, 10, 10,    # 左臂
           40, 40, 40, 40, 20, 10, 10]    # 右臂

      kd: [2, 2, 2, 4, 2, 2,              # 左腿
           2, 2, 2, 4, 2, 2,              # 右腿
           15, 12, 12,                    # 腰（加大阻尼，抑制振荡）
           1, 1, 1, 1, 0.5, 0.2, 0.2,     # 左臂
           1, 1, 1, 1, 0.5, 0.2, 0.2]     # 右臂

      # 默认关节角度（初始站立姿态）
      default_joint_pos: [-0.1, 0.0, 0.0, 0.3, -0.2, 0.0,    # 左腿
                          -0.1, 0.0, 0.0, 0.3, -0.2, 0.0,    # 右腿
                          0.0, 0.0, 0.0,                      # 腰
                          0.0, 0.2, 0.0, 0.3, 0.0, 0.0, 0.0, # 左臂
                          0.0, -0.2, 0.0, 0.3, 0.0, 0.0, 0.0] # 右臂
